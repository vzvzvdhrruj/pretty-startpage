<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Startpage — Catppuccin Mocha</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <button class="settings-btn" id="openSettings" title="Settings">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09c.7 0 1.24-.52 1.51-1A1.65 1.65 0 0 0 4.29 6.6l-.06-.06A2 2 0 0 1 7.06 3.7l.06.06c.45.45 1.14.64 1.82.33.48-.2 1-.47 1-.98V3a2 2 0 0 1 4 0v.09c0 .51.51.78 1 .98.68.31 1.37.12 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06c-.31.68-.12 1.37.33 1.82.31.31.7.52 1.09.62H21a2 2 0 0 1 0 4h-.09c-.39.1-.78.31-1.09.62z"/>
    </svg>
  </button>

  <main class="container">
    <div class="clock-section">
      <div id="clock" class="clock">--:--</div>
      <div id="tzLabel" class="timezone-label">Timezone</div>
    </div>

    <div class="search-section">
      <form class="search-form" id="searchForm" target="_self" method="GET" action="https://duckduckgo.com/">
        <input class="search-input" id="q" name="q" type="text" placeholder="Search the web (DuckDuckGo)" autocomplete="off" />
        <button class="btn-primary" type="submit">Search</button>
      </form>
    </div>
  </main>

  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-content">
      <h2 id="settingsTitle">Settings</h2>

      <div class="form-group">
        <label for="searchUrl">Search engine URL (use {q} where query goes)</label>
        <input type="text" id="searchUrl" value="https://duckduckgo.com/?q={q}" />
        <small>DuckDuckGo: https://duckduckgo.com/?q={q} · Google: https://www.google.com/search?q={q}</small>
      </div>

      <div class="form-group">
        <label for="clockFont">Clock font</label>
        <select id="clockFont">
          <option value="'Roboto Mono', monospace">Roboto Mono (monospace)</option>
          <option value="'Courier New', monospace">Courier New</option>
          <option value="system-ui">System UI (sans)</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="hourFormat">Hour format</label>
          <select id="hourFormat">
            <option value="auto">Auto (locale)</option>
            <option value="12">12-hour (AM/PM)</option>
            <option value="24">24-hour</option>
          </select>
        </div>

        <div class="form-group">
          <label for="timezone">Timezone (IANA)</label>
          <input type="text" id="timezone" placeholder="system, UTC, Europe/London" />
          <small>Type "system" for your browser/system timezone</small>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-ghost" id="closeBtn">Cancel</button>
        <button class="btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <footer class="footer">Catppuccin Mocha :) </footer>

  <script src="script.js"></script>
</body>
</html>
