<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Startpage</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="top-controls">
    <button class="ctrl-btn" id="openSettings" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7z"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09c.7 0 1.24-.52 1.51-1A1.65 1.65 0 0 0 4.29 6.6l-.06-.06A2 2 0 0 1 7.06 3.7l.06.06c.45.45 1.14.64 1.82.33.48-.2 1-.47 1-.98V3a2 2 0 0 1 4 0v.09c0 .51.51.78 1 .98.68.31 1.37.12 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06c-.31.68-.12 1.37.33 1.82.31.31.7.52 1.09.62H21a2 2 0 0 1 0 4h-.09c-.39.1-.78.31-1.09.62z"/>
      </svg>
    </button>
    <button class="ctrl-btn" id="editModeBtn" title="Edit layout">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
    </button>
  </div>

  <div class="edit-banner" id="editBanner">
    <span>Edit mode, drag widgets, resize from edges, click ⚙ to configure</span>
    <button class="btn-done" id="doneEditBtn">Done</button>
  </div>

  <main class="canvas" id="canvas"></main>

  <button class="add-widget-btn" id="addWidgetBtn" title="Add widget">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add widget
  </button>

  <div class="widget-picker" id="widgetPicker">
    <div class="picker-title">Add a widget</div>
    <div class="picker-list" id="pickerList"></div>
    <button class="btn-ghost picker-close" id="pickerClose">Cancel</button>
  </div>

  <div class="settings-sidebar" id="settingsSidebar">
    <div class="sidebar-header">
      <span class="sidebar-title" id="sidebarTitle">Widget Settings</span>
      <button class="sidebar-close" id="sidebarClose">✕</button>
    </div>
    <div class="sidebar-body" id="sidebarBody"></div>
    <div class="sidebar-footer">
      <button class="btn-ghost" id="sidebarCancel">Cancel</button>
      <button class="btn-primary" id="sidebarSave">Save</button>
    </div>
  </div>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>

  <div class="modal-overlay" id="modal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
    <div class="modal-content">
      <h2 id="settingsTitle">Settings</h2>
      <div class="form-group">
        <label for="theme">Theme</label>
        <select id="theme">
          <option value="mocha">Catppuccin Mocha</option>
          <option value="latte">Catppuccin Latte</option>
          <option value="frappe">Catppuccin Frappe</option>
          <option value="macchiato">Catppuccin Macchiato</option>
        </select>
      </div>
      <div class="form-group">
        <label for="searchUrl">Search engine URL (use {q} where query goes)</label>
        <input type="text" id="searchUrl" value="https://duckduckgo.com/?q={q}" />
        <small>DuckDuckGo: https://duckduckgo.com/?q={q} · Google: https://www.google.com/search?q={q}</small>
      </div>
      <div class="form-group">
        <label for="searchEnginePreset">Search engine</label>
        <select id="searchEnginePreset">
          <option value="custom">Custom</option>
          <option value="https://duckduckgo.com/?q={q}">DuckDuckGo</option>
          <option value="https://www.google.com/search?q={q}">Google</option>
          <option value="https://www.startpage.com/search?q={q}">Startpage</option>
          <option value="https://www.qwant.com/?q={q}">Qwant</option>
          <option value="https://yandex.com/search/?text={q}">Yandex</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-ghost" id="closeBtn">Cancel</button>
        <button class="btn-primary" id="saveBtn">Save</button>
      </div>
    </div>
  </div>

  <footer class="footer" id="footer">Catppuccin Mocha :)</footer>
  <script src="script.js"></script>
</body>
</html>
